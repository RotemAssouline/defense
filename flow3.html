<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spherical Flow • N→S • 45s Loop</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{height:100%;margin:0}
  canvas{display:block;width:100vw;height:100vh;background:#fff}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
(() => {
  // ===== Config =====
  const DURATION_MS = 45000;
  const CLOUD_SCHEDULE = [0, 10000, 20000, 30000];
  const PARTICLES_PER_CLOUD = 200;
  const MAX_PARTICLES = 1600;
  const CLOUD_SPREAD_DEG = 12;
  const GRID_LONS = 32, GRID_LATS = 10;

  const MERIDIONAL_SPEED = 0.45;   // radians/s toward south (phi increases)
  const DOT_RADIUS_PX = 2.2;       // identical dots
  const DOT_COLOR = '#000000';

  // ===== Canvas / sizing =====
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const STATIC_SCALE = .95;   // 1.0 = same as particles, >1 = bigger, <1 = smaller
  let DPR=1, W=0, H=0, CX=0, CY=0, Rpx=0;
  let CAM_D = 3.0;         // camera z in sphere radii
  let FOCAL = 1.2;         // focal length in sphere radii
  let Z_SIL = 0;      // z of the tangent (rim) circle in world units
  let R_SIL_PX = 0;   // projected rim radius in pixels

  function resize(){
    DPR = Math.max(1, Math.min(window.devicePixelRatio||1, 2));
    W = Math.round(innerWidth*DPR);
    H = Math.round(innerHeight*DPR);
    cv.width=W; cv.height=H;
    cv.style.width = innerWidth+'px';
    cv.style.height = innerHeight+'px';
    CX=W*0.5; CY=H*0.5;
    Rpx = Math.min(W,H);
    drawStatic();
  }
  addEventListener('resize', resize);

  // ===== PRNG =====
  function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296}}
  let seed=1, rnd=mulberry32(seed);

  // ===== Sphere math =====
  // phi: 0..π from +Y (north) to −Y (south). theta: 0..2π around Y.
  function sphToCart(phi, theta){
    const s=Math.sin(phi), c=Math.cos(phi);
    return {x:s*Math.cos(theta), y:c, z:s*Math.sin(theta)};
  }
  function clampPhi(phi){ return Math.max(0, Math.min(Math.PI, phi)); }
  function wrapTheta(t){ t%=2*Math.PI; return t<0? t+2*Math.PI : t; }

  // perspective projection of unit-sphere point
  function project(p){
    const denom = CAM_D - p.z;                 // camera at (0,0,CAM_D)
    if (denom <= 0) return {ok:false, x:0, y:0, depth:Infinity};
    const k = (FOCAL/denom)*Rpx;               // pixel scale
    return {ok: denom>0.15, x:CX+p.x*k, y:CY-p.y*k, depth:denom};
  }

  // Strict N→S tangent at p: projection of −Y onto tangent plane
  function tangentSouth(p){
    const dot = -p.y;                          // (-Y)·p
    let tx = -dot*p.x;
    let ty = -1 - dot*p.y;
    let tz = -dot*p.z;
    const L = Math.hypot(tx,ty,tz) || 1;
    return {x:tx/L, y:ty/L, z:tz/L};
  }
  // Move p along t by arc length s (Rodrigues)
  function moveOnSphere(p,t,s){
    const ax = t.y*p.z - t.z*p.y;
    const ay = t.z*p.x - t.x*p.z;
    const az = t.x*p.y - t.y*p.x;
    const aL = Math.hypot(ax,ay,az) || 1;
    const ux=ax/aL, uy=ay/aL, uz=az/aL;
    const cs=Math.cos(s), sn=Math.sin(s);
    const cx = uy*p.z - uz*p.y;
    const cy = uz*p.x - ux*p.z;
    const cz = ux*p.y - uy*p.x;
    return {x:p.x*cs + cx*sn, y:p.y*cs + cy*sn, z:p.z*cs + cz*sn};
  }

  // ===== Static sphere + grid + arrows (front hemisphere only) =====
  const staticCanvas = document.createElement('canvas');
  const sctx = staticCanvas.getContext('2d');

  function drawStatic(){
  staticCanvas.width = W; 
  staticCanvas.height = H;
  sctx.clearRect(0, 0, W, H);



  // arrows: same color, pointing south (N→S)
  sctx.strokeStyle = '#7FAEBA';
  sctx.fillStyle   = '#7FAEBA';
  for (let j = 0; j < GRID_LONS/2; j += 1) {
    const theta = j / GRID_LONS * 2 * Math.PI;
    for (let i = 1; i < GRID_LATS; i++) {
      const phi = i / GRID_LATS * Math.PI;
      drawArrow(phi, theta);
    }
  }
}


  function drawMeridian(theta){
    const S=160; let started=false;
    sctx.beginPath();
    for(let k=0;k<=S;k++){
      const phi = k/S * Math.PI;
      const p = sphToCart(phi, theta);
      const ps = { x: p.x * STATIC_SCALE, y: p.y * STATIC_SCALE, z: p.z * STATIC_SCALE };
      const q = project(ps);
      if(q.ok){ if(!started){ sctx.moveTo(q.x,q.y); started=true; } else sctx.lineTo(q.x,q.y); }
      else if(started){ sctx.stroke(); sctx.beginPath(); started=false; }
    }
    if(started) sctx.stroke();
  }

  function drawParallel(phi){
    const S=200; let started=false;
    sctx.beginPath();
    for(let k=0;k<=S;k++){
      const theta = k/S * 2*Math.PI;
      const p = sphToCart(phi, theta);
      const ps = { x: p.x * STATIC_SCALE, y: p.y * STATIC_SCALE, z: p.z * STATIC_SCALE };
      const q = project(ps);
      if(q.ok){ if(!started){ sctx.moveTo(q.x,q.y); started=true; } else sctx.lineTo(q.x,q.y); }
      else if(started){ sctx.stroke(); sctx.beginPath(); started=false; }
    }
    if(started) sctx.stroke();
  }

  // FIXED: arrows lie on the sphere along a single meridian, pointing N→S
  function drawArrow(phi, theta){
    const eps = 0.02;
    const seg = 0.10;                        // arrow arc length (radians)
    const phiN = clampPhi(Math.max(eps, phi - seg*0.5));         // north endpoint
    const phiS = clampPhi(Math.min(Math.PI - eps, phi + seg*0.5)); // south endpoint

    const pN = sphToCart(phiN, theta);
    const pS = sphToCart(phiS, theta);
    const psN = { x: pN.x * STATIC_SCALE, y: pN.y * STATIC_SCALE, z: pN.z * STATIC_SCALE };
    const psS = { x: pS.x * STATIC_SCALE, y: pS.y * STATIC_SCALE, z: pS.z * STATIC_SCALE };
    const a = project(psN);
    const b = project(psS);

    if(!a.ok || !b.ok) return;

    // shaft
    sctx.beginPath();
    sctx.moveTo(a.x,a.y);
    sctx.lineTo(b.x,b.y);
    sctx.stroke();

    // head at south end
    const vx=b.x-a.x, vy=b.y-a.y, L=Math.hypot(vx,vy)||1;
    const ux=vx/L, uy=vy/L, nx=-uy, ny=ux, head=5*DPR;
    sctx.beginPath();
    sctx.moveTo(b.x,b.y);
    sctx.lineTo(b.x-ux*head-nx*head*0.6, b.y-uy*head-ny*0.6*head);
    sctx.lineTo(b.x-ux*head+nx*head*0.6, b.y-uy*head+ny*0.6*head);
    sctx.closePath();
    sctx.fill();
  }

  // ===== Particles (spherical coords) =====
  const parts = new Float32Array(MAX_PARTICLES*2); // [phi, theta]
  let nParts=0, cloudsSpawned=0;

  function resetCycle(){
    seed = (seed+1)>>>0; rnd = mulberry32(seed);
    nParts=0; cloudsSpawned=0;
  }

  function addCloud(latDeg, lonDeg){
    const spread = CLOUD_SPREAD_DEG * Math.PI/180;
    const latRad = latDeg * Math.PI/180;
    const lonRad = lonDeg * Math.PI/180;
    const phi0 = Math.PI/2 - latRad;
    const theta0 = lonRad;
    for(let i=0;i<PARTICLES_PER_CLOUD && nParts<MAX_PARTICLES;i++){
      const dLat = (rnd()*2-1)*spread;
      const dLon = (rnd()*2-1)*spread;
      parts[2*nParts  ] = clampPhi(phi0 + dLat);
      parts[2*nParts+1] = wrapTheta(theta0 + dLon);
      nParts++;
    }
  }

  // ===== Animation (unchanged) =====
  function spawnScheduled(ms){
    while(cloudsSpawned < CLOUD_SCHEDULE.length && ms >= CLOUD_SCHEDULE[cloudsSpawned]){
      const baseLat=60, baseLon=-60, jitter=6; // degrees
      const lat = baseLat + (rnd()*2-1)*jitter;
      const lon = baseLon + (rnd()*2-1)*jitter;
      addCloud(lat, lon);
      cloudsSpawned++;
    }
  }

  let t0=performance.now(), last=performance.now();
  function frame(now){
    const prevPhase = ((now - t0 - 16) % DURATION_MS + DURATION_MS) % DURATION_MS / DURATION_MS;
    const phase     = ((now - t0) % DURATION_MS) / DURATION_MS;
    if(phase < prevPhase){ resetCycle(); }
    spawnScheduled(phase*DURATION_MS);

    // integrate strictly toward south: theta constant, phi increases
    const dt = Math.min(0.05, (now - last)/1000) || 0.0167; last = now;
    const dphi = MERIDIONAL_SPEED * dt;
    for(let i=0;i<nParts;i++){ parts[2*i] = clampPhi(parts[2*i] + dphi); }

    // render
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(staticCanvas, 0, 0);

    // identical dots (front hemisphere only)
    const r = DOT_RADIUS_PX * DPR;
    ctx.fillStyle = DOT_COLOR;
    ctx.globalAlpha = 1;
    for(let i=0;i<nParts;i++){
      const p = sphToCart(parts[2*i], parts[2*i+1]);
      const q = project(p);
      if(!q.ok) continue;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r, 0, 2*Math.PI);
      ctx.fill();
    }

    requestAnimationFrame(frame);
  }

  // ===== Start =====
  resize();
  requestAnimationFrame((t)=>{ last=t; frame(t); });
})();
</script>
</body>
</html>
